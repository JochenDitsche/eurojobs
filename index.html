<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇪🇺 Eurostat AI Impact Explorer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid #2d3748;
            margin-bottom: 25px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle { color: #94a3b8; font-size: 1.1rem; }
        
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            border: 1px solid #334155;
            backdrop-filter: blur(10px);
        }
        
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        
        .control-group label {
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        select, button {
            padding: 12px 20px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        select:hover, button:hover { 
            border-color: #60a5fa; 
            background: #252f47;
            transform: translateY(-1px);
        }
        
        button.active { 
            background: linear-gradient(135deg, #3b82f6, #8b5cf6); 
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.6);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .legend {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            padding: 15px;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 10px;
        }
        
        .legend-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .legend-color { 
            width: 24px; 
            height: 24px; 
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        #treemap-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 16px;
            border: 1px solid #334155;
            overflow: hidden;
            position: relative;
            min-height: 700px;
        }
        
        .loading, .error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 700px;
            font-size: 1.2rem;
            color: #64748b;
        }
        
        .error { color: #ef4444; }
        
        .breadcrumbs {
            padding: 15px 20px;
            background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid #334155;
            font-size: 0.95rem;
        }
        
        .breadcrumbs span { cursor: pointer; color: #60a5fa; }
        .breadcrumbs span:hover { text-decoration: underline; }
        .breadcrumbs .current { color: #e2e8f0; cursor: default; }
        .breadcrumbs .current:hover { text-decoration: none; }
        
        .tooltip {
            position: absolute;
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid #475569;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            max-width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        
        .tooltip h3 { 
            font-size: 1.1rem; 
            margin-bottom: 10px; 
            color: #f8fafc;
            font-weight: 600;
        }
        
        .tooltip-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 6px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid #334155;
        }
        
        .tooltip-row:last-child { border-bottom: none; }
        .tooltip-label { color: #94a3b8; }
        .tooltip-value { font-weight: 600; color: #e2e8f0; }
        
        .node {
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .node:hover {
            filter: brightness(1.1);
        }
        
        .node-label {
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            #treemap-container { min-height: 500px; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇪🇺 Eurostat AI Impact Explorer</h1>
            <p class="subtitle">Detailed European Labor Market Analysis by Occupation & AI Risk</p>
        </header>
        
        <div class="controls">
            <div class="control-group">
                <label>View Mode</label>
                <div>
                    <button id="btn-eu" class="active" onclick="setMode('eu')">🇪🇺 All Europe</button>
                    <button id="btn-country" onclick="setMode('country')">🏳️ By Country</button>
                </div>
            </div>
            
            <div class="control-group">
                <label>Select Country</label>
                <select id="country-select" onchange="selectCountry(this.value)" disabled>
                    <option value="">Choose a country...</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Navigation</label>
                <button id="btn-back" onclick="goBack()" disabled>← Back to Overview</button>
            </div>
        </div>
        
        <div class="stats-bar" id="stats-bar">
            <!-- Stats will be populated by JS -->
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #dc2626, #ef4444);"></div>
                <span>🔴 High AI Risk (≥7.5)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #f59e0b, #fbbf24);"></div>
                <span>🟡 Medium Risk (5.0-7.5)</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #10b981, #34d399);"></div>
                <span>🟢 Low Risk (<5.0)</span>
            </div>
        </div>
        
        <div id="treemap-container">
            <div class="breadcrumbs" id="breadcrumbs" style="display: none;">
                <span id="bc-root" onclick="goToRoot()">Overview</span>
                <span id="bc-separator" style="display: none;"> → </span>
                <span id="bc-current" class="current"></span>
            </div>
            <div class="loading" id="loading">Loading data...</div>
        </div>
        
        <!-- Country Insights Panel -->
        <div id="insights-panel" style="display: none; margin-top: 25px; padding: 25px; background: rgba(30, 41, 59, 0.8); border-radius: 16px; border: 1px solid #334155;">
            <h2 id="insights-title" style="font-size: 1.5rem; margin-bottom: 20px; color: #f8fafc;"></h2>
            
            <div id="insights-content" style="color: #e2e8f0; line-height: 1.7;">
                <!-- Content will be populated by JS -->
            </div>
        </div>
        
    </div>
    
    <div class="tooltip" id="tooltip"></div>
    
    <script>
        // Global state
        let euData = null;
        let countriesData = null;
        let currentMode = 'eu';
        let currentCountry = null;
        let currentView = 'root'; // 'root' or 'detail' (showing jobs within a group)
        let selectedGroup = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });
        
        // Load data files
        async function loadData() {
            try {
                const [euResponse, countriesResponse] = await Promise.all([
                    fetch('eu_treemap_data.json'),
                    fetch('countries_detailed.json')
                ]);
                
                if (!euResponse.ok || !countriesResponse.ok) {
                    throw new Error('Failed to load data files');
                }
                
                euData = await euResponse.json();
                countriesData = await countriesResponse.json();
                
                populateCountrySelect();
                updateStats();
                renderTreemap();
                
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        <p>⚠️ Error loading data</p>
                        <p>${error.message}</p>
                    </div>`;
            }
        }
        
        function populateCountrySelect() {
            const select = document.getElementById('country-select');
            const countries = Object.entries(countriesData).sort((a, b) => 
                a[1].name.localeCompare(b[1].name)
            );
            
            countries.forEach(([code, data]) => {
                const option = document.createElement('option');
                option.value = code;
                option.textContent = `${data.flag} ${data.name}`;
                select.appendChild(option);
            });
        }
        
        function setMode(mode) {
            currentMode = mode;
            currentView = 'root';
            selectedGroup = null;
            
            document.getElementById('btn-eu').classList.toggle('active', mode === 'eu');
            document.getElementById('btn-country').classList.toggle('active', mode === 'country');
            document.getElementById('country-select').disabled = mode === 'eu';
            document.getElementById('btn-back').disabled = true;
            document.getElementById('breadcrumbs').style.display = 'none';
            
            if (mode === 'eu') {
                currentCountry = null;
                document.getElementById('country-select').value = '';
                document.getElementById('insights-panel').style.display = 'none';
            }
            
            updateStats();
            renderTreemap();
        }
        
        function selectCountry(countryCode) {
            if (!countryCode) {
                document.getElementById('insights-panel').style.display = 'none';
                return;
            }
            
            currentCountry = countryCode;
            currentView = 'root';
            selectedGroup = null;
            document.getElementById('btn-back').disabled = true;
            document.getElementById('breadcrumbs').style.display = 'none';
            document.getElementById('bc-current').textContent = '';
            
            updateStats();
            renderTreemap();
            updateInsightsPanel(); // Hier wird der Text generiert
        }
        
        function updateStats() {
            const statsBar = document.getElementById('stats-bar');
            let stats;
            
            if (currentMode === 'eu') {
                stats = {
                    total: euData.total_employment,
                    avgAi: euData.avg_ai_exposure,
                    high: euData.high_risk_pct,
                    medium: euData.medium_risk_pct,
                    low: euData.low_risk_pct
                };
            } else if (currentCountry && countriesData[currentCountry]) {
                const m = countriesData[currentCountry].metrics;
                stats = {
                    total: m.total,
                    avgAi: m.avg_ai_exposure,
                    high: m.high_pct,
                    medium: m.medium_pct,
                    low: m.low_pct
                };
            } else {
                stats = { total: 0, avgAi: 0, high: 0, medium: 0, low: 0 };
            }
            
            statsBar.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${(stats.total / 1000000).toFixed(1)}M</div>
                    <div class="stat-label">Total Workers</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.avgAi.toFixed(2)}</div>
                    <div class="stat-label">Avg AI Risk</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #ef4444;">${stats.high.toFixed(1)}%</div>
                    <div class="stat-label">🔴 High Risk</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #f59e0b;">${stats.medium.toFixed(1)}%</div>
                    <div class="stat-label">🟡 Medium Risk</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color: #10b981;">${stats.low.toFixed(1)}%</div>
                    <div class="stat-label">🟢 Low Risk</div>
                </div>
            `;
        }
        
        function getDataForTreemap() {
            if (currentView === 'detail' && selectedGroup) {
                // Show detailed jobs for selected group
                let children;
                if (currentMode === 'eu') {
                    const group = euData.major_groups.find(g => g.major_group === selectedGroup);
                    children = group ? group.children : [];
                } else if (currentCountry && countriesData[currentCountry]) {
                    const country = countriesData[currentCountry];
                    children = country.jobs.filter(j => j.major_group === selectedGroup);
                }
                
                if (!children || children.length === 0) return null;
                
                return { 
                    name: getMajorGroupName(selectedGroup), 
                    children: children.map(c => ({
                        name: c.name,
                        value: c.employment || c.value,
                        aiExposure: c.aiExposure,
                        color: c.color || getColorForExposure(c.aiExposure)
                    }))
                };
            } else {
                // Show major groups overview
                if (currentMode === 'eu') {
                    return {
                        name: 'Europe',
                        children: euData.major_groups.map(g => ({
                            name: g.name,
                            value: g.value,
                            aiExposure: g.aiExposure,
                            major_group: g.major_group,
                            color: getColorForExposure(g.aiExposure),
                            isGroup: true
                        }))
                    };
                } else if (currentCountry && countriesData[currentCountry]) {
                    const country = countriesData[currentCountry];
                    
                    // Aggregate jobs by major group
                    const groupMap = {};
                    country.jobs.forEach(job => {
                        if (!groupMap[job.major_group]) {
                            groupMap[job.major_group] = {
                                name: getMajorGroupName(job.major_group),
                                value: 0,
                                aiSum: 0,
                                major_group: job.major_group
                            };
                        }
                        groupMap[job.major_group].value += job.employment;
                        groupMap[job.major_group].aiSum += job.employment * job.aiExposure;
                    });
                    
                    // Calculate weighted AI exposure and format
                    const children = Object.values(groupMap).map(g => {
                        const avgAi = g.aiSum / g.value;
                        return {
                            name: g.name,
                            value: g.value,
                            aiExposure: avgAi,
                            major_group: g.major_group,
                            color: getColorForExposure(avgAi),
                            isGroup: true
                        };
                    }).sort((a, b) => b.value - a.value);
                    
                    return {
                        name: country.name,
                        children: children
                    };
                }
            }
            return null;
        }
        
        function getMajorGroupName(code) {
            const names = {
                "0": "Armed Forces", "1": "Managers", "2": "Professionals",
                "3": "Technicians", "4": "Clerical Support", "5": "Service & Sales",
                "6": "Agricultural", "7": "Craft & Trade", "8": "Machine Operators",
                "9": "Elementary Occupations"
            };
            return names[code] || code;
        }
        
        function getColorForExposure(ai) {
            if (ai >= 7.5) return '#dc2626';
            if (ai >= 5.0) return '#f59e0b';
            return '#10b981';
        }
        
        function renderTreemap() {
            const container = document.getElementById('treemap-container');
            const data = getDataForTreemap();
            
            console.log('Rendering treemap:', { currentMode, currentCountry, currentView, data });
            
            if (!data || !data.children || data.children.length === 0) {
                // Clear previous SVG but keep breadcrumbs
                const existingSvg = container.querySelector('svg');
                if (existingSvg) existingSvg.remove();
                
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error';
                errorDiv.innerHTML = '<p>No data available for this selection</p>';
                errorDiv.style.height = '600px';
                errorDiv.style.display = 'flex';
                errorDiv.style.alignItems = 'center';
                errorDiv.style.justifyContent = 'center';
                
                // Remove old error if exists
                const oldError = container.querySelector('.error');
                if (oldError) oldError.remove();
                
                container.appendChild(errorDiv);
                return;
            }
            
            // Remove error div if exists
            const oldError = container.querySelector('.error');
            if (oldError) oldError.remove();
            
            // Clear previous SVG but keep breadcrumbs
            const existingSvg = container.querySelector('svg');
            if (existingSvg) existingSvg.remove();
            
            const width = container.clientWidth;
            const height = 700;
            
            // Create SVG
            const svg = d3.select('#treemap-container')
                .append('svg')
                .attr('width', width)
                .attr('height', height);
            
            // Create hierarchy
            const root = d3.hierarchy(data)
                .sum(d => d.value || 0)
                .sort((a, b) => (b.value || 0) - (a.value || 0));
            
            // Create treemap layout
            d3.treemap()
                .size([width, height])
                .padding(2)
                .round(true)
                (root);
            
            // Create nodes
            const nodes = svg.selectAll('g')
                .data(root.leaves())
                .enter()
                .append('g')
                .attr('transform', d => `translate(${d.x0},${d.y0})`);
            
            // Add rectangles
            nodes.append('rect')
                .attr('width', d => Math.max(0, d.x1 - d.x0))
                .attr('height', d => Math.max(0, d.y1 - d.y0))
                .attr('fill', d => d.data.color || getColorForExposure(d.data.aiExposure || 5))
                .attr('stroke', '#1e293b')
                .attr('stroke-width', 1)
                .attr('opacity', 0.9)
                .attr('class', 'node')
                .on('click', function(event, d) {
                    if (d.data.isGroup && currentView === 'root') {
                        drillDown(d.data.major_group, d.data.name);
                    }
                })
                .on('mouseover', function(event, d) {
                    d3.select(this).attr('opacity', 1);
                    showTooltip(event, d);
                })
                .on('mousemove', moveTooltip)
                .on('mouseout', function() {
                    d3.select(this).attr('opacity', 0.9);
                    hideTooltip();
                });
            
            // Add labels
            nodes.each(function(d) {
                const width = d.x1 - d.x0;
                const height = d.y1 - d.y0;
                const node = d3.select(this);
                
                if (width > 60 && height > 40) {
                    const name = d.data.name || 'Unknown';
                    const displayName = name.length > 25 ? name.substring(0, 25) + '...' : name;
                    
                    node.append('text')
                        .attr('x', 8)
                        .attr('y', 20)
                        .text(displayName)
                        .attr('fill', 'white')
                        .attr('font-size', '12px')
                        .attr('font-weight', '600')
                        .attr('class', 'node-label');
                    
                    if (height > 60) {
                        const value = (d.value || 0) / 1000000;
                        const ai = d.data.aiExposure || 0;
                        
                        node.append('text')
                            .attr('x', 8)
                            .attr('y', 38)
                            .text(`${value.toFixed(2)}M`)
                            .attr('fill', 'rgba(255,255,255,0.9)')
                            .attr('font-size', '11px')
                            .attr('class', 'node-label');
                        
                        node.append('text')
                            .attr('x', 8)
                            .attr('y', 54)
                            .text(`AI: ${ai.toFixed(1)}`)
                            .attr('fill', 'rgba(255,255,255,0.7)')
                            .attr('font-size', '10px')
                            .attr('class', 'node-label');
                    }
                }
            });
        }
        
        function drillDown(groupCode, groupName) {
            selectedGroup = groupCode;
            currentView = 'detail';
            
            document.getElementById('btn-back').disabled = false;
            document.getElementById('breadcrumbs').style.display = 'block';
            document.getElementById('bc-separator').style.display = 'inline';
            document.getElementById('bc-current').textContent = groupName;
            
            renderTreemap();
        }
        
        function goBack() {
            currentView = 'root';
            selectedGroup = null;
            
            document.getElementById('btn-back').disabled = true;
            document.getElementById('breadcrumbs').style.display = 'none';
            document.getElementById('bc-current').textContent = '';
            
            renderTreemap();
        }
        
        function goToRoot() {
            goBack();
        }
        
        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            const value = (d.value || 0) / 1000000;
            const ai = d.data.aiExposure || 0;
            const isGroup = d.data.isGroup;
            
            let riskLevel = ai >= 7.5 ? '🔴 High' : ai >= 5.0 ? '🟡 Medium' : '🟢 Low';
            
            tooltip.innerHTML = `
                <h3>${d.data.name}</h3>
                <div class="tooltip-row">
                    <span class="tooltip-label">Employment:</span>
                    <span class="tooltip-value">${value.toFixed(2)} million</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">AI Risk Score:</span>
                    <span class="tooltip-value">${ai.toFixed(1)}/10</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">Risk Level:</span>
                    <span class="tooltip-value">${riskLevel}</span>
                </div>
                ${isGroup ? '<div class="tooltip-row"><span style="color: #60a5fa; font-size: 0.85rem;">Click to see detailed occupations →</span></div>' : ''}
            `;
            
            tooltip.style.opacity = '1';
            moveTooltip(event);
        }
        
        function moveTooltip(event) {
            const tooltip = document.getElementById('tooltip');
            const x = event.pageX + 15;
            const y = event.pageY + 15;
            
            const rect = tooltip.getBoundingClientRect();
            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;
            
            let finalX = x;
            let finalY = y;
            
            if (x + rect.width > winWidth) finalX = x - rect.width - 15;
            if (y + rect.height > winHeight) finalY = y - rect.height - 15;
            
            tooltip.style.left = finalX + 'px';
            tooltip.style.top = finalY + 'px';
        }
        
        function hideTooltip() {
            document.getElementById('tooltip').style.opacity = '0';
        }
        
        function updateInsightsPanel() {
            const panel = document.getElementById('insights-panel');
            const title = document.getElementById('insights-title');
            const content = document.getElementById('insights-content');
            
            if (currentMode !== 'country' || !currentCountry || !countriesData[currentCountry]) {
                panel.style.display = 'none';
                return;
            }
            
            const country = countriesData[currentCountry];
            const m = country.metrics;
            
            // Find top 5 highest and lowest risk jobs
            const sortedJobs = [...country.jobs].sort((a, b) => b.aiExposure - a.aiExposure);
            const highestRisk = sortedJobs.slice(0, 5);
            const lowestRisk = sortedJobs.slice(-5).reverse();
            
            // Find largest occupations
            const largestJobs = [...country.jobs].sort((a, b) => b.employment - a.employment).slice(0, 5);
            
            // Calculate major group distribution
            const groupTotals = {};
            country.jobs.forEach(job => {
                if (!groupTotals[job.major_group]) {
                    groupTotals[job.major_group] = { name: getMajorGroupName(job.major_group), total: 0 };
                }
                groupTotals[job.major_group].total += job.employment;
            });
            const sortedGroups = Object.values(groupTotals).sort((a, b) => b.total - a.total);
            
            // Generate narrative based on risk level
            let riskNarrative = '';
            if (m.avg_ai_exposure >= 4.8) {
                riskNarrative = `<strong style="color: #f59e0b;">⚠️ Above Average Risk:</strong> ${country.name} shows higher-than-average AI exposure. This is typically driven by a larger share of clerical work, administrative roles, and knowledge-intensive professions that face significant automation potential.`;
            } else if (m.avg_ai_exposure <= 4.2) {
                riskNarrative = `<strong style="color: #10b981;">✅ Lower Risk Profile:</strong> ${country.name} demonstrates a more resilient occupational structure. The economy relies more heavily on manual trades, personal services, and agricultural work—categories that are harder to automate with current AI technologies.`;
            } else {
                riskNarrative = `<strong style="color: #60a5fa;">➡️ Average Risk:</strong> ${country.name} aligns closely with the European average. The occupational mix provides a balanced exposure to AI transformation across different sectors.`;
            }
            
            // Generate insights HTML
            title.innerHTML = `${country.flag} ${country.name} — Detailed Analysis`;
            
            content.innerHTML = `
                <div style="margin-bottom: 25px; padding: 20px; background: rgba(15, 23, 42, 0.6); border-radius: 12px; border-left: 4px solid ${getColorForExposure(m.avg_ai_exposure)};">
                    ${riskNarrative}
                </div>
                
                <h3 style="color: #60a5fa; margin: 25px 0 15px 0; font-size: 1.2rem;">📊 Key Metrics</h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px;">
                    <div style="padding: 15px; background: rgba(30, 41, 59, 0.5); border-radius: 10px;">
                        <div style="color: #94a3b8; font-size: 0.85rem;">Total Workforce</div>
                        <div style="font-size: 1.5rem; font-weight: 700; color: #f8fafc;">${(m.total / 1000000).toFixed(2)}M</div>
                    </div>
                    <div style="padding: 15px; background: rgba(30, 41, 59, 0.5); border-radius: 10px;">
                        <div style="color: #94a3b8; font-size: 0.85rem;">AI Risk Score</div>
                        <div style="font-size: 1.5rem; font-weight: 700; color: ${getColorForExposure(m.avg_ai_exposure)};">${m.avg_ai_exposure.toFixed(2)}/10</div>
                    </div>
                    <div style="padding: 15px; background: rgba(30, 41, 59, 0.5); border-radius: 10px;">
                        <div style="color: #94a3b8; font-size: 0.85rem;">High Risk Workers</div>
                        <div style="font-size: 1.5rem; font-weight: 700; color: #ef4444;">${m.high_pct.toFixed(1)}%</div>
                    </div>
                </div>
                
                <h3 style="color: #60a5fa; margin: 25px 0 15px 0; font-size: 1.2rem;">🏭 Largest Sectors</h3>
                <div style="margin-bottom: 25px;">
                    ${sortedGroups.slice(0, 3).map((g, i) => `
                        <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155;">
                            <span>${i + 1}. ${g.name}</span>
                            <span style="color: #94a3b8;">${(g.total / 1000).toFixed(0)}K workers</span>
                        </div>
                    `).join('')}
                </div>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px;">
                    <div>
                        <h4 style="color: #ef4444; margin-bottom: 15px; font-size: 1.1rem;">🔴 Highest AI Risk Jobs</h4>
                        <div style="background: rgba(30, 41, 59, 0.5); border-radius: 10px; padding: 15px;">
                            ${highestRisk.map(job => `
                                <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 0.9rem;">
                                    <span>${job.name}</span>
                                    <span style="color: #ef4444; font-weight: 600;">${job.aiExposure.toFixed(1)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div>
                        <h4 style="color: #10b981; margin-bottom: 15px; font-size: 1.1rem;">🟢 Most AI-Safe Jobs</h4>
                        <div style="background: rgba(30, 41, 59, 0.5); border-radius: 10px; padding: 15px;">
                            ${lowestRisk.map(job => `
                                <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; font-size: 0.9rem;">
                                    <span>${job.name}</span>
                                    <span style="color: #10b981; font-weight: 600;">${job.aiExposure.toFixed(1)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
                
                <h3 style="color: #60a5fa; margin: 25px 0 15px 0; font-size: 1.2rem;">👥 Largest Occupations</h3>
                <div style="background: rgba(30, 41, 59, 0.5); border-radius: 10px; padding: 15px;">
                    ${largestJobs.map((job, i) => `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155;">
                            <div>
                                <div style="font-weight: 600;">${i + 1}. ${job.name}</div>
                                <div style="font-size: 0.85rem; color: #94a3b8;">${(job.employment / 1000).toFixed(0)}K workers</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="color: ${getColorForExposure(job.aiExposure)}; font-weight: 700;">AI: ${job.aiExposure.toFixed(1)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div style="margin-top: 25px; padding: 20px; background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1)); border-radius: 12px; border: 1px solid rgba(59, 130, 246, 0.3);">
                    <h4 style="color: #60a5fa; margin-bottom: 10px;">💡 Strategic Implications</h4>
                    <p style="font-size: 0.95rem; color: #cbd5e1;">
                        ${m.high_pct > 25 ? 
                            `With <strong>${m.high_pct.toFixed(1)}%</strong> of workers in high-risk occupations, ${country.name} faces significant workforce transformation. Priority should be given to reskilling programs in administrative and IT sectors.` :
                            m.low_pct > 65 ?
                            `With <strong>${m.low_pct.toFixed(1)}%</strong> of workers in AI-resilient occupations, ${country.name} has natural protection. Focus should be on augmenting these roles with AI tools rather than replacement.` :
                            `${country.name} has a balanced risk profile. A dual strategy of AI augmentation for medium-risk roles and selective automation for high-risk roles is recommended.`
                        }
                    </p>
                </div>
            `;
            
            panel.style.display = 'block';
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            if (euData || countriesData) {
                renderTreemap();
            }
        });
    </script>
</body>
</html>
